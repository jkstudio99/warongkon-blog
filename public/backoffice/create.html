<!doctype html>
<html lang="th">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Create Post | Blog Back Office</title>
		<script>
			document.documentElement.dataset.theme = localStorage.getItem('warongkon.backoffice.theme') || 'system';
			document.documentElement.lang = localStorage.getItem('warongkon.backoffice.language') || 'th';
		</script>
		<link rel="stylesheet" href="/backoffice/styles.css" />
	</head>
	<body data-i18n-document-title="title.create">
		<div class="app-shell">
			<aside class="sidebar">
				<a class="brand" href="/backoffice/" aria-label="Blog Back Office">
					<span class="brand-mark">W</span>
					<span><strong>Warongkon</strong><small>Blog Ops</small></span>
				</a>
				<nav class="nav" aria-label="Back office">
					<a class="nav-item" href="/backoffice/" data-i18n="nav.content">Content</a>
					<a class="nav-item active" href="/backoffice/create" data-i18n="nav.create">Create</a>
				</nav>
				<div class="side-card">
					<p class="label" data-i18n="mode.label">Mode</p>
					<strong data-i18n="create.mode">Create post</strong>
					<span data-i18n="create.help">Writes a new folder under src/content/blog</span>
				</div>
			</aside>

			<main class="workspace form-workspace">
				<header class="topbar">
					<div>
						<p id="statusText" class="label">Create</p>
						<h1 data-i18n="create.title">Create Blog Post</h1>
					</div>
					<div class="top-actions">
						<div class="preference-bar" aria-label="Preferences">
							<div class="segmented-control" data-i18n-aria-label="preferences.language" aria-label="Language">
								<button class="segmented-option" type="button" data-lang-option="th">TH</button>
								<button class="segmented-option" type="button" data-lang-option="en">EN</button>
							</div>
							<div class="segmented-control" data-i18n-aria-label="preferences.theme" aria-label="Theme">
								<button class="segmented-option icon-toggle" type="button" data-theme-option="light" data-i18n-aria-label="theme.light" data-i18n-title="theme.light" aria-label="Light mode" title="Light mode">
									<span class="lucide-icon lucide-sun" aria-hidden="true"></span>
								</button>
								<button class="segmented-option icon-toggle" type="button" data-theme-option="dark" data-i18n-aria-label="theme.dark" data-i18n-title="theme.dark" aria-label="Dark mode" title="Dark mode">
									<span class="lucide-icon lucide-moon" aria-hidden="true"></span>
								</button>
								<button class="segmented-option icon-toggle" type="button" data-theme-option="system" data-i18n-aria-label="theme.system" data-i18n-title="theme.system" aria-label="System mode" title="System mode">
									<span class="lucide-icon lucide-monitor" aria-hidden="true"></span>
								</button>
							</div>
						</div>
						<a class="button ghost" href="/backoffice/" data-i18n="actions.cancel">Cancel</a>
						<button id="saveButton" class="button primary" type="button" data-i18n="actions.createPost">Create post</button>
					</div>
				</header>

				<section class="panel form-panel">
					<form id="postForm" class="form">
						<div class="form-section">
							<p class="section-title" data-i18n="form.meta">Meta</p>
							<div class="field-grid two">
								<label class="field"><span data-i18n="form.title">Title</span><input id="titleInput" required /></label>
								<label class="field">
									<span data-i18n="form.slug">Slug</span>
									<div class="inline-field">
										<input id="slugInput" required pattern="[a-z0-9][a-z0-9-]*[a-z0-9]" />
										<button id="slugButton" class="button compact" type="button" data-i18n="actions.generate">Generate</button>
									</div>
								</label>
							</div>
							<label class="field"><span data-i18n="form.seoTitle">SEO title</span><input id="seoTitleInput" /></label>
							<label class="field"><span data-i18n="form.description">Description</span><textarea id="descriptionInput" rows="3" required></textarea></label>
							<div class="field-grid three">
								<label class="field"><span data-i18n="form.published">Published</span><input id="pubDateInput" type="date" required /></label>
								<label class="field"><span data-i18n="form.updated">Updated</span><input id="updatedDateInput" type="date" /></label>
								<label class="field"><span data-i18n="form.tags">Tags</span><input id="tagsInput" placeholder="AI, Thailand, Tech Update" data-i18n-placeholder="form.tagsPlaceholder" /></label>
							</div>
						</div>

						<div class="form-section cover-section">
							<div>
								<p class="section-title" data-i18n="form.cover">Cover</p>
								<div class="cover-preview">
									<img id="coverPreview" alt="Cover preview" />
									<div class="cover-empty" data-i18n="form.coverSize">960 x 480</div>
								</div>
							</div>
							<label class="field"><span data-i18n="form.uploadImage">Upload image</span><input id="coverInput" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml" /></label>
						</div>

						<div class="form-section">
							<p class="section-title" data-i18n="form.content">Content</p>
							<label class="field"><span data-i18n="form.markdownBody">Markdown body</span><textarea id="bodyInput" class="body-input" required></textarea></label>
						</div>
					</form>
				</section>
			</main>
		</div>

		<script type="module" src="/backoffice/editor.js"></script>
	</body>
</html>
