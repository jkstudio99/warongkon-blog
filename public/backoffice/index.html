<!doctype html>
<html lang="th">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Blog Back Office</title>
		<script>
			document.documentElement.dataset.theme = localStorage.getItem('warongkon.backoffice.theme') || 'system';
			document.documentElement.lang = localStorage.getItem('warongkon.backoffice.language') || 'th';
		</script>
		<link rel="stylesheet" href="/backoffice/styles.css" />
	</head>
	<body data-i18n-document-title="title.dashboard">
		<div class="app-shell">
			<aside class="sidebar">
				<a class="brand" href="/backoffice/" aria-label="Blog Back Office">
					<span class="brand-mark">W</span>
					<span><strong>Warongkon</strong><small>Blog Ops</small></span>
				</a>
				<nav class="nav" aria-label="Back office">
					<a class="nav-item active" href="/backoffice/" data-i18n="nav.content">Content</a>
					<a class="nav-item" href="/backoffice/create" data-i18n="nav.create">Create</a>
				</nav>
				<div class="side-card">
					<p class="label" data-i18n="repository.label">Repository</p>
					<strong>src/content/blog</strong>
					<span data-i18n="repository.source">Markdown content source</span>
				</div>
			</aside>

			<main class="workspace">
				<header class="topbar">
					<div>
						<p class="label" data-i18n="dashboard.label">Dashboard</p>
						<h1 data-i18n="dashboard.title">Blog Management</h1>
					</div>
					<div class="top-actions">
						<div class="preference-bar" aria-label="Preferences">
							<div class="segmented-control" data-i18n-aria-label="preferences.language" aria-label="Language">
								<button class="segmented-option" type="button" data-lang-option="th">TH</button>
								<button class="segmented-option" type="button" data-lang-option="en">EN</button>
							</div>
							<div class="segmented-control" data-i18n-aria-label="preferences.theme" aria-label="Theme">
								<button class="segmented-option icon-toggle" type="button" data-theme-option="light" data-i18n-aria-label="theme.light" data-i18n-title="theme.light" aria-label="Light mode" title="Light mode">
									<span class="lucide-icon lucide-sun" aria-hidden="true"></span>
								</button>
								<button class="segmented-option icon-toggle" type="button" data-theme-option="dark" data-i18n-aria-label="theme.dark" data-i18n-title="theme.dark" aria-label="Dark mode" title="Dark mode">
									<span class="lucide-icon lucide-moon" aria-hidden="true"></span>
								</button>
								<button class="segmented-option icon-toggle" type="button" data-theme-option="system" data-i18n-aria-label="theme.system" data-i18n-title="theme.system" aria-label="System mode" title="System mode">
									<span class="lucide-icon lucide-monitor" aria-hidden="true"></span>
								</button>
							</div>
						</div>
						<button id="refreshButton" class="button ghost" type="button" data-i18n="actions.refresh">Refresh</button>
						<a class="button primary" href="/backoffice/create" data-i18n="actions.newPost">New post</a>
					</div>
				</header>

				<section class="metrics" aria-label="Blog stats">
					<article class="metric-card"><span data-i18n="metrics.totalPosts">Total posts</span><strong id="postCount">0</strong></article>
					<article class="metric-card"><span data-i18n="metrics.latestDate">Latest date</span><strong id="latestDate">-</strong></article>
					<article class="metric-card"><span data-i18n="metrics.tags">Tags</span><strong id="tagCount">0</strong></article>
					<article class="metric-card"><span data-i18n="metrics.withCover">With cover</span><strong id="coverCount">0</strong></article>
				</section>

				<section class="panel library-panel" aria-labelledby="libraryTitle">
					<div class="panel-header">
						<div>
							<p class="label" data-i18n="library.label">Library</p>
							<h2 id="libraryTitle" data-i18n="library.title">Posts</h2>
						</div>
						<label class="search-field">
							<span class="visually-hidden" data-i18n="search.posts">Search posts</span>
							<input id="searchInput" type="search" placeholder="Search title, slug, tag" data-i18n-placeholder="search.posts" />
						</label>
					</div>

					<div class="table-shell dashboard-table">
						<table>
							<thead>
								<tr>
									<th data-i18n="table.title">Title</th>
									<th data-i18n="table.date">Date</th>
									<th data-i18n="table.tags">Tags</th>
									<th data-i18n="table.cover">Cover</th>
									<th data-i18n="table.actions">Actions</th>
								</tr>
							</thead>
							<tbody id="postList"></tbody>
						</table>
					</div>
				</section>
			</main>
		</div>

		<script type="module" src="/backoffice/dashboard.js"></script>
	</body>
</html>
