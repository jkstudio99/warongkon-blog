  </g>
  <text x="104" y="520" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800" fill="#ffffff">Little Nightmares III</text>
  <text x="104" y="570" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#f8d77b">The Backstage turns horror DLC into a launch beat</text>
