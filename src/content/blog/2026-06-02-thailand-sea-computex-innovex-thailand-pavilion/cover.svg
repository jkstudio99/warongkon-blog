<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">COMPUTEX InnoVEX Thailand pavilion cover</title>
  <desc id="desc">A startup pavilion map linking Thailand and Southeast Asia to the InnoVEX exhibition in Taipei.</desc>
  <defs>
    <linearGradient id="bg" x2="1" y2="1">
      <stop stop-color="#131017"/>
      <stop offset="0.5" stop-color="#3f1d2d"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x2="1" y2="1">
