<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Warhammer Skulls and Mechanicus 2 cover</title>
  <desc id="desc">Mechanical skull emblem, tactical grid, and launch date elements for a games consumer news story.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="0.5" stop-color="#7f1d1d"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="16" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#fecaca" stroke-width="2">
    <path d="M120 130 H1080"/>
    <path d="M120 230 H1080"/>
    <path d="M120 330 H1080"/>
    <path d="M120 430 H1080"/>
    <path d="M240 80 V560"/>
    <path d="M440 80 V560"/>
    <path d="M640 80 V560"/>
    <path d="M840 80 V560"/>
    <path d="M1040 80 V560"/>
  </g>
  <g transform="translate(434 96)" filter="url(#shadow)">
    <circle cx="166" cy="166" r="150" fill="#fef2f2"/>
    <circle cx="112" cy="150" r="34" fill="#111827"/>
    <circle cx="220" cy="150" r="34" fill="#111827"/>
    <path d="M128 230 h76 l-18 54 h-40z" fill="#111827"/>
    <rect x="118" y="292" width="96" height="38" rx="8" fill="#fef2f2"/>
    <rect x="134" y="292" width="10" height="38" fill="#111827"/>
    <rect x="162" y="292" width="10" height="38" fill="#111827"/>
    <rect x="190" y="292" width="10" height="38" fill="#111827"/>
    <path d="M166 16 v-58 M166 374 v58 M16 166 h-58 M374 166 h58" stroke="#fef2f2" stroke-width="18" stroke-linecap="round"/>
    <circle cx="166" cy="166" r="184" fill="none" stroke="#fca5a5" stroke-width="10"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="600" y="510" font-size="54" font-weight="800" fill="#ffffff">WARHAMMER SKULLS 2026</text>
    <text x="600" y="560" font-size="30" font-weight="700" fill="#fecaca">Mechanicus II launches May 21</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="82" y="88" font-size="32" font-weight="700" fill="#fee2e2">GAMES / CONSUMER</text>
  </g>
</svg>
