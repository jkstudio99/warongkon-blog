<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Bubu Battle Royale Nintendo Switch cover</title>
  <desc id="desc">Stylized forest battle royale map with shrinking zone, supply crate, weapons, and Nintendo Switch release marker.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="52%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="zone" cx="50%" cy="45%" r="46%">
      <stop offset="0%" stop-color="#bbf7d0" stop-opacity="0.2"/>
      <stop offset="72%" stop-color="#22c55e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.9"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="246" fill="url(#zone)" stroke="#fdba74" stroke-width="10" stroke-dasharray="20 18"/>
