  <path d="M490 304 H710 M600 252 V394" stroke="#78350f" stroke-width="8"/>
  <path d="M352 182 l-92 46 l92 46 l92 -46 Z" fill="#e0f2fe" stroke="#0369a1" stroke-width="6"/>
  <path d="M352 274 V342" stroke="#e0f2fe" stroke-width="6" stroke-linecap="round"/>
  <circle cx="352" cy="360" r="20" fill="#f8fafc"/>
  <g fill="#f8fafc">
