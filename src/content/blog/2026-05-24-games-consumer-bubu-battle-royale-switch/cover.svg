  <text x="122" y="560" fill="#dcfce7" font-family="Arial, Helvetica, sans-serif" font-size="22">Games / Consumer - May 24, 2026</text>
  <text x="760" y="560" fill="#fed7aa" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">25 opponents / shrinking zone</text>
