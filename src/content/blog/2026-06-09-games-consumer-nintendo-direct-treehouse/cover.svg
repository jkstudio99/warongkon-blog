  <text x="116" y="504" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="800" fill="#ffffff">Nintendo Direct</text>
  <text x="116" y="558" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#ffe2e6">June 9, 2026 + Treehouse Live gameplay</text>
  <text x="826" y="530" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="800" fill="#ffffff">50 + 95</text>
  <text x="828" y="566" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#ffe2e6">minutes</text>
