<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Nintendo Direct June 2026 cover</title>
  <desc id="desc">A red Nintendo Direct inspired broadcast stage with Switch controllers and Treehouse gameplay panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e60012"/>
      <stop offset="0.58" stop-color="#b90018"/>
      <stop offset="1" stop-color="#332238"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 460 C170 382 315 438 470 388 C645 330 785 224 1200 292 L1200 630 L0 630 Z" fill="#231b2f" opacity="0.45"/>
  <g transform="translate(115 95)" filter="url(#shadow)">
    <rect x="0" y="0" width="510" height="300" rx="34" fill="#ffffff"/>
    <rect x="34" y="34" width="442" height="218" rx="24" fill="#191923"/>
    <polygon points="236,91 236,195 326,143" fill="#e60012"/>
    <rect x="92" y="268" width="320" height="16" rx="8" fill="#e60012"/>
  </g>
  <g transform="translate(710 116)" filter="url(#shadow)">
    <rect x="0" y="0" width="248" height="286" rx="52" fill="#ffffff"/>
    <rect x="54" y="30" width="140" height="226" rx="18" fill="#151722"/>
    <circle cx="36" cy="86" r="18" fill="#e60012"/>
    <circle cx="214" cy="86" r="18" fill="#e60012"/>
    <circle cx="36" cy="188" r="18" fill="#222"/>
    <circle cx="214" cy="188" r="18" fill="#222"/>
  </g>
  <g transform="translate(790 360)">
    <rect x="0" y="0" width="260" height="92" rx="24" fill="#ffffff" opacity="0.92"/>
    <rect x="28" y="24" width="84" height="44" rx="12" fill="#2f8f55"/>
    <rect x="130" y="24" width="74" height="16" rx="8" fill="#22303d"/>
