  <text x="86" y="548" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800">Thailand Startup Ecosystem 2026</text>
  <text x="90" y="590" fill="#ccfbf1" font-family="Arial, Helvetica, sans-serif" font-size="26">Bangkok leads, secondary cities accelerate, MedTech stands out</text>
