<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">NVIDIA and SK hynix memory partnership cover</title>
  <desc id="desc">Abstract AI factory memory modules connected to a semiconductor fab digital twin.</desc>
  <defs>
