    <circle cx="1220" cy="350" r="12"/>
  </g>
  <g stroke="#ffd166" stroke-width="6" stroke-linecap="round" opacity="0.65">
    <line x1="830" y1="430" x2="640" y2="320"/>
    <line x1="830" y1="430" x2="520" y2="445"/>
