<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Cognition Singapore APAC hub cover</title>
  <desc id="desc">A stylized Southeast Asia regional hub map with code nodes centered on Singapore.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b0f2a"/>
      <stop offset="55%" stop-color="#3c096c"/>
      <stop offset="100%" stop-color="#ff7b00"/>
    </linearGradient>
    <linearGradient id="hub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ff9f1c"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1260" cy="180" r="170" fill="#ffffff" opacity="0.07"/>
  <circle cx="250" cy="740" r="230" fill="#ffd166" opacity="0.08"/>
  <rect x="135" y="125" width="1330" height="650" rx="42" fill="#12061f" opacity="0.6" stroke="#ffd166" stroke-opacity="0.25"/>
