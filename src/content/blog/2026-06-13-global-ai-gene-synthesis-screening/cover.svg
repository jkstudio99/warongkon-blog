<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI biosecurity and gene synthesis screening</title>
  <desc id="desc">A stylized DNA helix, shield, and AI node network for an article about mandatory nucleic acid synthesis screening.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
