  <text x="136" y="516" fill="#bfdbfe" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">$2B expansion inside a $200B US plan</text>
  <text x="86" y="590" fill="#bfdbfe" font-family="Arial, Helvetica, sans-serif" font-size="22">Hardware / Infrastructure - May 23, 2026</text>
