<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Microsoft Build 2026 agent platform cover</title>
  <desc id="desc">Abstract enterprise AI agent network with Microsoft-inspired colors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.56" stop-color="#102d4f"/>
      <stop offset="1" stop-color="#1b3a32"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="88" y="78" width="1024" height="474" rx="34" fill="#f8fafc" opacity="0.08" stroke="#dbeafe" stroke-opacity="0.18"/>
  <g stroke="#94a3b8" stroke-width="4" stroke-linecap="round" opacity="0.55">
    <path d="M266 326 C380 230 488 225 594 316"/>
    <path d="M594 316 C711 414 828 401 930 296"/>
    <path d="M358 424 C470 362 580 371 703 454"/>
    <path d="M346 214 C520 152 688 164 854 246"/>
  </g>
  <g filter="url(#shadow)">
    <circle cx="266" cy="326" r="62" fill="#60a5fa"/>
    <circle cx="594" cy="316" r="82" fill="#22c55e"/>
    <circle cx="930" cy="296" r="62" fill="#f97316"/>
    <circle cx="346" cy="214" r="46" fill="#facc15"/>
    <circle cx="854" cy="246" r="46" fill="#ef4444"/>
    <circle cx="703" cy="454" r="54" fill="#38bdf8"/>
    <circle cx="358" cy="424" r="42" fill="#a78bfa"/>
  </g>
  <g fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle">
    <text x="266" y="335" font-size="24">IQ</text>
    <text x="594" y="325" font-size="30">AGENT</text>
    <text x="930" y="305" font-size="24">MAI</text>
  </g>
  <text x="110" y="132" fill="#dbeafe" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">GLOBAL / AI</text>
  <text x="110" y="492" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="800">BUILD 2026</text>
  <text x="110" y="540" fill="#bfdbfe" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Agent platform, Microsoft IQ, and MAI models</text>
</svg>
