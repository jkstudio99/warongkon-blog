<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">GPT-Red automated red-team cover</title>
  <desc id="desc">Abstract red-team safety loop with attack prompts, model defenses, and robustness signals.</desc>
  <defs>
