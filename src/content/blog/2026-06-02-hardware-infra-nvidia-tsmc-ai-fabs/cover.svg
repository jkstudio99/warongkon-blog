  <desc id="desc">A semiconductor wafer, fab tools, and accelerated computing pipelines for AI-enabled chip manufacturing.</desc>
  <defs>
    <linearGradient id="bg" x2="1" y2="1">
      <stop stop-color="#102018"/>
      <stop offset="0.5" stop-color="#123524"/>
      <stop offset="1" stop-color="#06150f"/>
    </linearGradient>
    <radialGradient id="wafer" cx="50%" cy="45%" r="60%">
      <stop stop-color="#e0f2fe"/>
      <stop offset="0.45" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#0f766e"/>
