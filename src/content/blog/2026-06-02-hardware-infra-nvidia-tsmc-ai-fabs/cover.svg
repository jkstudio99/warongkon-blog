  <text x="72" y="151" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800">AI ENTERS THE FAB</text>
  <text x="72" y="198" fill="#bbf7d0" font-family="Arial, Helvetica, sans-serif" font-size="26">NVIDIA + TSMC SEMICONDUCTOR WORKFLOWS</text>
